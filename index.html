<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gem Crush</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0f0c29;
    --surface: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.12);
    --accent: #f9c74f;
    --accent2: #f3722c;
    --text: #f0eeff;
    --gem-size: min(11vw, 62px);
    --gap: min(1.5vw, 6px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

  body {
    background: linear-gradient(145deg, #0f0c29 0%, #1a1047 50%, #24243e 100%);
    min-height: 100dvh;
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(120,80,255,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(255,80,120,0.2) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Stars */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    opacity: var(--op, 0.4);
  }
  /* Stars static on mobile — saves main thread */

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 430px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 12px 20px;
    gap: 14px;
  }

  /* Header */
  .header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 0;
  }

  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: 28px;
    background: linear-gradient(135deg, #f9c74f, #f3722c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 12px rgba(249,199,79,0.4));
  }

  .score-panel {
    display: flex;
    gap: 10px;
  }

  .score-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px 14px;
    text-align: center;
  }

  .score-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.55;
  }

  .score-value {
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    line-height: 1.1;
    color: var(--accent);
    transition: transform 0.15s;
  }

  .score-value.pop {
    animation: scorePopAnim 0.3s ease;
  }

  @keyframes scorePopAnim {
    0% { transform: scale(1); }
    50% { transform: scale(1.35); color: #fff; }
    100% { transform: scale(1); }
  }

  /* Level & progress */
  .level-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .level-badge {
    background: linear-gradient(135deg, #7b2ff7, #b44ff7);
    border-radius: 10px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
    box-shadow: 0 0 14px rgba(123,47,247,0.5);
  }

  .progress-wrap {
    flex: 1;
    height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #7b2ff7, #f9c74f);
    border-radius: 10px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 8px rgba(249,199,79,0.5);
  }

  .moves-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }

  .moves-badge span {
    color: var(--accent);
    font-family: 'Fredoka One', cursive;
    font-size: 16px;
  }

  /* Board */
  .board-wrap {
    position: relative;
    width: 100%;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: var(--gap);
    width: 100%;
    padding: calc(var(--gap) * 0.5);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }

  .cell {
    aspect-ratio: 1;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: transform 0.1s;
    font-size: calc(var(--gem-size) * 0.55);
    overflow: visible;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }

  .cell:active { transform: scale(0.9); }

  /* Auto-hint highlight */
  .cell.hint-glow {
    animation: hintGlow 0.7s ease infinite alternate;
  }
  @keyframes hintGlow {
    from { box-shadow: 0 0 0 2px rgba(249,199,79,0.5), 0 0 10px rgba(249,199,79,0.3); }
    to   { box-shadow: 0 0 0 3px rgba(249,199,79,1),   0 0 22px rgba(249,199,79,0.8); }
  }

  .gem {
    width: 100%;
    height: 100%;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: calc(var(--gem-size) * 0.52);
    position: relative;
    transition: transform 0.08s;
    box-shadow: 
      0 3px 10px rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,0.35),
      inset 0 -2px 0 rgba(0,0,0,0.2);
    will-change: transform;
    transform: translateZ(0);
  }



  /* Gem colors */
  .gem-0 { background: linear-gradient(145deg, #ff6b9d, #c9184a); }
  .gem-1 { background: linear-gradient(145deg, #74b9ff, #0984e3); }
  .gem-2 { background: linear-gradient(145deg, #55efc4, #00b894); }
  .gem-3 { background: linear-gradient(145deg, #fdcb6e, #e17055); }
  .gem-4 { background: linear-gradient(145deg, #a29bfe, #6c5ce7); }
  .gem-5 { background: linear-gradient(145deg, #fd79a8, #fddb89); }
  .gem-6 { background: linear-gradient(145deg, #ffe066, #f9a825); }


  /* ══════════════════════════════════════
     BOOSTER GEM VISUALS — canvas-based, no layout impact
     ══════════════════════════════════════ */

  /* Booster gem: transparent bg, strictly sized, no overflow */
  .gem.booster-row,
  .gem.booster-col,
  .gem.booster-color,
  .gem.booster-bomb,
  .gem.booster-tshape {
    background: transparent !important;
    box-shadow: none !important;
    font-size: 0 !important;
    line-height: 0 !important;
    overflow: hidden !important;
  }
  .gem.booster-row::after,
  .gem.booster-col::after,
  .gem.booster-color::after,
  .gem.booster-bomb::after,
  .gem.booster-tshape::after { display: none !important; }

  /* Canvas icon — positioned absolutely, cannot affect layout */
  .booster-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100% !important;
    height: 100% !important;
    display: block;
    pointer-events: none;
  }

  /* Animations applied to the canvas element */
  .gem.booster-row    .booster-canvas { animation: boosterPulse 1.2s ease infinite alternate; }
  .gem.booster-col    .booster-canvas { animation: boosterPulse 1.2s ease infinite alternate; }
  .gem.booster-color  .booster-canvas { animation: boosterPulse 1.0s ease infinite alternate; }
  .gem.booster-bomb   .booster-canvas { animation: boosterPulse 0.9s ease infinite alternate; }

  .gem.booster-color.awaiting .booster-canvas {
    animation: rainbowAwait 0.35s ease infinite alternate !important;
  }







  /* Single lightweight pulse for all boosters — opacity only (compositor) */
  @keyframes boosterPulse {
    from { opacity: 0.75; }
    to   { opacity: 1; }
  }
  .gem.booster-tshape .booster-canvas { animation: boosterPulse 1.1s ease infinite alternate; }

  .gem.invalid {
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-5px); }
    40%     { transform: translateX(5px); }
    60%     { transform: translateX(-4px); }
    80%     { transform: translateX(4px); }
  }

  /* Shuffle animation — gems scatter then land */
  .gem.shuffle-out {
    animation: shuffleOut 0.25s cubic-bezier(.4,0,1,1) forwards;
  }
  .gem.shuffle-in {
    animation: shuffleIn 0.35s cubic-bezier(0,.8,.3,1.3) forwards;
  }
  @keyframes shuffleOut {
    0%   { transform: scale(1) rotate(0deg); opacity: 1; }
    60%  { transform: scale(1.15) rotate(var(--sr, 15deg)); opacity: 0.6; }
    100% { transform: scale(0) rotate(var(--sr, 25deg)); opacity: 0; }
  }
  @keyframes shuffleIn {
    0%   { transform: scale(0) rotate(var(--sr, -20deg)) translateY(var(--sy,-20px)); opacity: 0; }
    60%  { transform: scale(1.12) rotate(calc(var(--sr, -20deg)*-0.3)) translateY(0); opacity: 1; }
    100% { transform: scale(1) rotate(0deg) translateY(0); opacity: 1; }
  }

  /* Particles */
  .particle {
    position: absolute;
    pointer-events: none;
    border-radius: 50%;
    z-index: 10;
    animation: particleFly var(--dur, 0.6s) ease forwards;
  }

  @keyframes particleFly {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx,0), var(--ty,-60px)) scale(0); opacity: 0; }
  }

  .combo-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Fredoka One', cursive;
    font-size: 42px;
    color: white;
    text-shadow: 0 0 20px rgba(249,199,79,0.8), 0 4px 8px rgba(0,0,0,0.5);
    pointer-events: none;
    z-index: 20;
    animation: comboAnim 0.8s cubic-bezier(.17,.67,.57,1.4) forwards;
    white-space: nowrap;
  }

  @keyframes comboAnim {
    0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
    30%  { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    70%  { transform: translate(-50%, -80%) scale(1);   opacity: 1; }
    100% { transform: translate(-50%, -120%) scale(0.8); opacity: 0; }
  }

  /* Overlay */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .overlay-card {
    background: linear-gradient(145deg, #1a1047, #24243e);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 36px 32px;
    text-align: center;
    max-width: 320px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: slideUp 0.4s cubic-bezier(.17,.67,.57,1.4);
  }

  @keyframes slideUp {
    from { transform: translateY(40px) scale(0.9); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }

  .overlay-emoji { font-size: 64px; margin-bottom: 12px; display: block; }

  .overlay-title {
    font-family: 'Fredoka One', cursive;
    font-size: 36px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #f9c74f, #f3722c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .overlay-sub {
    font-size: 15px;
    opacity: 0.7;
    margin-bottom: 24px;
    line-height: 1.5;
  }

  .overlay-score {
    font-family: 'Fredoka One', cursive;
    font-size: 52px;
    color: var(--accent);
    display: block;
    margin-bottom: 24px;
    filter: drop-shadow(0 0 16px rgba(249,199,79,0.5));
  }

  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    margin-bottom: 10px;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, #7b2ff7, #b44ff7);
    color: white;
    box-shadow: 0 4px 20px rgba(123,47,247,0.5);
  }

  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-boost {
    background: linear-gradient(135deg, #f9a825, #e65100);
    border: none;
    color: #fff;
    font-size: 14px;
    box-shadow: 0 0 16px rgba(249,168,37,0.45);
    animation: boostBtnPulse 1.4s ease infinite alternate;
  }
  @keyframes boostBtnPulse {
    from { box-shadow: 0 0 10px rgba(249,168,37,0.4); }
    to   { box-shadow: 0 0 24px rgba(249,168,37,0.8); }
  }

  .btn-quit {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(240,238,255,0.7);
    font-size: 14px;
  }

  /* ── Toolbar below board ── */
  .toolbar {
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 14px;
  }
  .tool-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 9px 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 7px;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  .tool-btn:active { transform: scale(0.93); }
  .tool-btn.dragging {
    opacity: 0.55;
    box-shadow: 0 0 0 2px var(--accent);
  }
  .tool-btn .t-icon { font-size: 20px; line-height: 1; }
  .tool-btn .t-count {
    background: rgba(249,199,79,0.18);
    color: var(--accent);
    border-radius: 8px;
    padding: 1px 7px;
    font-family: 'Fredoka One', cursive;
    font-size: 14px;
    min-width: 22px;
    text-align: center;
  }

  /* Bomb drag ghost */
  #bomb-ghost {
    position: fixed;
    pointer-events: none;
    font-size: 28px;
    transform: translate(-50%,-50%);
    z-index: 999;
    display: none;
    filter: drop-shadow(0 0 8px rgba(255,120,30,0.9));
  }

  /* Cell highlight while bomb is dragged over it */
  .cell.bomb-target {
    box-shadow: 0 0 0 2px rgba(255,140,0,0.9), 0 0 14px rgba(255,100,0,0.7);
    z-index: 2;
  }


</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="app">
  <div class="header">
    <div class="logo">💎 Gem Crush</div>
    <div class="score-panel">
      <div class="score-box">
        <div class="score-label">Score</div>
        <div class="score-value" id="score">0</div>
      </div>
    </div>
  </div>

  <div class="level-row">
    <div class="level-badge" id="level-badge">⭐ Level 1</div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="moves-badge">🎯 <span id="moves">30</span> left</div>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>

  <div class="toolbar">
    <button class="tool-btn" id="btn-shuffle" ontouchstart="useShuffle()" onclick="useShuffle()">
      <span class="t-icon">🔀</span> Shuffle
      <span class="t-count" id="shuffle-count">2</span>
    </button>
    <button class="tool-btn" id="btn-bomb"
      ontouchstart="startBombDrag(event)"
      onmousedown="startBombDrag(event)">
      <span class="t-icon">💣</span> Bomb
      <span class="t-count" id="bomb-count">1</span>
    </button>
  </div>
</div>

<div id="bomb-ghost">💣</div>

<div class="overlay" id="overlay">
  <div class="overlay-card" id="overlay-card">
    <span class="overlay-emoji" id="overlay-emoji">💎</span>
    <div class="overlay-title" id="overlay-title">Gem Crush</div>
    <div class="overlay-sub" id="overlay-sub">Match 3 gems in a row or column to crush them! Earn points and level up!</div>
    <span class="overlay-score" id="overlay-score" style="display:none"></span>
    <button class="btn btn-primary" id="overlay-btn" onclick="overlayAction()">▶ Play</button>
    <button class="btn btn-secondary" id="overlay-btn2" style="display:none" onclick="overlayAction2()">🔄 Restart</button>
    <button class="btn btn-boost" id="overlay-btn3" style="display:none" onclick="overlayAction3()">⚡ +5 Moves</button>
    <button class="btn btn-quit" id="overlay-btn4" style="display:none" onclick="overlayAction4()">🚪 Quit</button>
    <button class="btn btn-primary" id="overlay-btn5" style="display:none" onclick="overlayAction5()">▶ Next Level</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  GEM CRUSH — performance-optimised rewrite
// ══════════════════════════════════════════════════════════════
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();tg.setBackgroundColor('#0f0c29');tg.setHeaderColor('#0f0c29');}

(function(){
  const cont=document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');s.className='star';
    s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
    s.style.setProperty('--t',(2+Math.random()*4)+'s');
    s.style.setProperty('--d',(Math.random()*5)+'s');
    s.style.setProperty('--op',(0.3+Math.random()*0.7).toString());
    cont.appendChild(s);
  }
})();

const COLS=8,ROWS=8,GEM_TYPES=7;
// SVG gem shapes — no gradient IDs (avoids duplicate-ID bugs across 64 cells)
// Each uses a base fill color + inner highlight for depth
const GEM_SVGS=[
  // 0 red — diamond
  '<svg viewBox="0 0 40 40"><polygon points="20,2 38,20 20,38 2,20" fill="#e8185a" stroke="#ff9ec0" stroke-width="1.5"/><polygon points="20,6 34,20 20,34 6,20" fill="#c9184a"/><polygon points="14,14 26,14 20,8" fill="rgba(255,255,255,0.35)"/></svg>',
  // 1 blue — circle
  '<svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="17" fill="#0984e3" stroke="#93c8ff" stroke-width="1.5"/><circle cx="20" cy="20" r="12" fill="#0770c4"/><ellipse cx="14" cy="13" rx="5" ry="3" fill="rgba(255,255,255,0.35)" transform="rotate(-20,14,13)"/></svg>',
  // 2 green — hexagon
  '<svg viewBox="0 0 40 40"><polygon points="20,3 35,11.5 35,28.5 20,37 5,28.5 5,11.5" fill="#00b894" stroke="#80ffcb" stroke-width="1.5"/><polygon points="20,9 29,14 29,26 20,31 11,26 11,14" fill="#009e7e"/><polygon points="13,14 27,14 20,7" fill="rgba(255,255,255,0.3)"/></svg>',
  // 3 orange — rounded square
  '<svg viewBox="0 0 40 40"><rect x="4" y="4" width="32" height="32" rx="8" fill="#e17055" stroke="#ffe09e" stroke-width="1.5"/><rect x="4" y="4" width="32" height="32" rx="8" fill="#c8583c"/><rect x="10" y="10" width="18" height="9" rx="4" fill="rgba(255,255,255,0.3)"/></svg>',
  // 4 purple — triangle
  '<svg viewBox="0 0 40 40"><polygon points="20,3 37,36 3,36" fill="#6c5ce7" stroke="#c8b8ff" stroke-width="1.5"/><polygon points="20,9 32,33 8,33" fill="#5a4bcc"/><polygon points="14,22 26,22 20,12" fill="rgba(255,255,255,0.25)"/></svg>',
  // 5 pink — 5-point star
  '<svg viewBox="0 0 40 40"><polygon points="20,2 24.9,15 38.5,15 27.8,23.5 31.8,37 20,28.5 8.2,37 12.2,23.5 1.5,15 15.1,15" fill="#f72585" stroke="#ffb3d1" stroke-width="1.5"/><polygon points="20,7 23.5,17 34,17 25.5,23 28.5,33.5 20,27.5 11.5,33.5 14.5,23 6,17 16.5,17" fill="#d91a6e"/><ellipse cx="16" cy="17" rx="4" ry="2" fill="rgba(255,255,255,0.3)" transform="rotate(-15,16,17)"/></svg>',
  // 6 yellow — pentagon gem
  '<svg viewBox="0 0 40 40"><polygon points="20,3 37,15 31,35 9,35 3,15" fill="#f9a825" stroke="#ffe066" stroke-width="1.5"/><polygon points="20,8 32,18 27,33 13,33 8,18" fill="#e08c00"/><polygon points="13,17 27,17 22,10 18,10" fill="rgba(255,255,255,0.35)"/></svg>'
];
const MOVE_PER_LEVEL=30,SCORE_PER_GEM=50;
// Progressive threshold: level 1=300, each level *1.5, rounded to 50
function levelThreshold(lvl){ return Math.round(700*Math.pow(1.5,lvl-1)/50)*50; }
const GEM_COLORS=['#ff6b9d','#74b9ff','#55efc4','#fdcb6e','#a29bfe','#fd79a8','#f9a825'];

let board=[],score=0,moves=MOVE_PER_LEVEL;
let selected=null,busy=false,level=1,levelScore=0;
let hints=3,shuffles=2,bombs=1,colorBombPending=null;

const boardEl=document.getElementById('board');
const scoreEl=document.getElementById('score');
const movesEl=document.getElementById('moves');
const progressEl=document.getElementById('progress-bar');
const levelEl=document.getElementById('level-badge');
const overlay=document.getElementById('overlay');

const wait=ms=>new Promise(r=>setTimeout(r,ms));

// ── Cell lookup cache — O(1) instead of querySelector ─────────
let cellCache=[];
function buildCellCache(){
  cellCache=[];
  for(let r=0;r<ROWS;r++){
    cellCache[r]=[];
    for(let c=0;c<COLS;c++){
      cellCache[r][c]=boardEl.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    }
  }
}
function getCell(r,c){return(r>=0&&r<ROWS&&c>=0&&c<COLS)?cellCache[r]?.[c]:null;}

// Cache cell size — only recalculate on resize
let _cellSize=0;
function getCellSize(){
  if(!_cellSize){const c=boardEl.querySelector('.cell');_cellSize=c?c.getBoundingClientRect().height:50;}
  return _cellSize;
}
window.addEventListener('resize',()=>{_cellSize=0;});

function gemType(v){return typeof v==='object'&&v!==null?v.gemType:v;}
function isBooster(v){return typeof v==='object'&&v!==null;}

// ── Move counter ───────────────────────────────────────────────
function spendMove(){
  moves=Math.max(0,moves-1);
  movesEl.textContent=moves;
}

// ── Board ──────────────────────────────────────────────────────
function createBoard(){
  board=Array.from({length:ROWS},(_,r)=>Array.from({length:COLS},(_,c)=>safeRandom(r,c)));
}
function safeRandom(r,c){
  let t;
  do{t=Math.floor(Math.random()*GEM_TYPES);}
  while((c>=2&&gemType(board[r]?.[c-1])===t&&gemType(board[r]?.[c-2])===t)||
        (r>=2&&gemType(board[r-1]?.[c])===t&&gemType(board[r-2]?.[c])===t));
  return t;
}

// ── Render ─────────────────────────────────────────────────────
function renderBoard(){
  boardEl.innerHTML='';
  const frag=document.createDocumentFragment();
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)frag.appendChild(makeCell(r,c));
  boardEl.appendChild(frag);
  buildCellCache();
  requestAnimationFrame(initBoosterCanvases);
}
function makeCell(r,c){
  const cell=document.createElement('div');
  cell.className='cell';cell.dataset.r=r;cell.dataset.c=c;
  cell.appendChild(makeGem(board[r][c]));
  return cell;
}
const BOOSTER_EMOJIS={row:'🚀',col:'🚀',color:'🌈',bomb:'💣',tshape:'✚'};

function makeBoosterCanvas(emoji){
  const c=document.createElement('canvas');
  c.className='booster-canvas';
  c._emoji=emoji;
  return c;
}
function drawBoosterCanvas(canvas){
  const sz=Math.round(canvas.offsetWidth||48);
  if(sz===0)return;
  canvas.width=sz;canvas.height=sz;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,sz,sz);
  ctx.font=`${Math.round(sz*0.72)}px serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(canvas._emoji,sz/2,sz/2+sz*0.03);
}
function initBoosterCanvases(){
  boardEl.querySelectorAll('.booster-canvas').forEach(c=>{if(!c.width)drawBoosterCanvas(c);});
}
function makeGem(val){
  const t=gemType(val);
  const gem=document.createElement('div');
  gem.className=`gem gem-${t}`;
  if(isBooster(val)){
    gem.classList.add(`booster-${val.kind}`);
    gem.appendChild(makeBoosterCanvas(BOOSTER_EMOJIS[val.kind]||'⚡'));
  }else{
    gem.innerHTML=GEM_SVGS[t]||'';
    // SVG fills the gem
    const svg=gem.querySelector('svg');
    if(svg){svg.style.cssText='width:78%;height:78%;display:block;margin:auto;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4))';}
  }
  return gem;
}
function updateCellGem(r,c){
  const cell=getCell(r,c);if(!cell)return;
  cell.innerHTML='';
  cell.appendChild(makeGem(board[r][c]));
  requestAnimationFrame(()=>{
    const bc=cell.querySelector('.booster-canvas');
    if(bc)drawBoosterCanvas(bc);
  });
}

// ── Auto-hint system ──────────────────────────────────────────
let hintTimer=null;
let hintCells=[];

function resetHintTimer(){
  clearTimeout(hintTimer);
  clearHint();
  // Always schedule — showAutoHint checks busy itself
  hintTimer=setTimeout(showAutoHint, 15000);
}

function clearHint(){
  hintCells.forEach(el=>el?.classList.remove('hint-glow'));
  hintCells=[];
}

function showAutoHint(){
  if(busy) return;
  clearHint();
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      for(const[r2,c2] of [[r,c+1],[r+1,c]]){
        if(r2>=ROWS||c2>=COLS) continue;
        [board[r][c],board[r2][c2]]=[board[r2][c2],board[r][c]];
        const m=findAllMatches();
        [board[r][c],board[r2][c2]]=[board[r2][c2],board[r][c]];
        if(m.size>0){
          const c1El=getCell(r,c), c2El=getCell(r2,c2);
          if(c1El&&c2El){
            c1El.classList.add('hint-glow');
            c2El.classList.add('hint-glow');
            hintCells=[c1El,c2El];
            // Clear after 3s, then repeat every 5s if still idle
            hintTimer=setTimeout(()=>{
              clearHint();
              hintTimer=setTimeout(showAutoHint,5000);
            },3000);
          }
          return;
        }
      }
    }
  }
}

// ── Input — board-level single listener (mobile-optimised) ────
function attachCellEvents(cell,r,c){
  // No-op: all input handled by the single board listener below
}

function getCellFromPoint(x,y){
  const el=document.elementFromPoint(x,y);
  if(!el)return null;
  const cell=el.closest('[data-r]');
  if(!cell)return null;
  return{r:+cell.dataset.r,c:+cell.dataset.c};
}

let dragStart=null,dragMoved=false;

function setupBoardInput(){
  // Touch events — direct, no 300ms delay
  boardEl.addEventListener('touchstart',e=>{
    if(busy||bombDragging)return;
    e.preventDefault(); // prevent scroll AND 300ms click delay
    const t=e.touches[0];
    const cell=getCellFromPoint(t.clientX,t.clientY);
    if(!cell)return;
    resetHintTimer();
    dragStart={...cell,x:t.clientX,y:t.clientY};
    dragMoved=false;
  },{passive:false});

  boardEl.addEventListener('touchmove',e=>{
    if(!dragStart)return;
    e.preventDefault();
    const t=e.touches[0];
    const dx=t.clientX-dragStart.x,dy=t.clientY-dragStart.y;
    if(!dragMoved&&(Math.abs(dx)>10||Math.abs(dy)>10))dragMoved=true;
  },{passive:false});

  boardEl.addEventListener('touchend',e=>{
    if(!dragStart)return;
    e.preventDefault();
    const t=e.changedTouches[0];
    const dx=t.clientX-dragStart.x,dy=t.clientY-dragStart.y;
    const{r,c}=dragStart;
    if(!dragMoved){
      handleTap(r,c);
    } else {
      let r2=r,c2=c;
      if(Math.abs(dx)>Math.abs(dy))c2=c+(dx>0?1:-1);
      else r2=r+(dy>0?1:-1);
      if(r2>=0&&r2<ROWS&&c2>=0&&c2<COLS){clearSelected();doSwap(r,c,r2,c2);}
    }
    dragStart=null;dragMoved=false;
  },{passive:false});

  // Mouse events for desktop
  boardEl.addEventListener('mousedown',e=>{
    if(busy)return;
    const cell=getCellFromPoint(e.clientX,e.clientY);
    if(!cell)return;
    resetHintTimer();
    dragStart={...cell,x:e.clientX,y:e.clientY};
    dragMoved=false;
    const onMove=ev=>{
      if(!dragStart)return;
      if(!dragMoved&&(Math.abs(ev.clientX-dragStart.x)>6||Math.abs(ev.clientY-dragStart.y)>6))dragMoved=true;
    };
    const onUp=ev=>{
      window.removeEventListener('mousemove',onMove);
      window.removeEventListener('mouseup',onUp);
      if(!dragStart)return;
      const{r,c}=dragStart;
      if(!dragMoved){
        handleTap(r,c);
      } else {
        const dx2=ev.clientX-dragStart.x,dy2=ev.clientY-dragStart.y;
        let r2=r,c2=c;
        if(Math.abs(dx2)>Math.abs(dy2))c2=c+(dx2>0?1:-1);
        else r2=r+(dy2>0?1:-1);
        if(r2>=0&&r2<ROWS&&c2>=0&&c2<COLS){clearSelected();doSwap(r,c,r2,c2);}
      }
      dragStart=null;dragMoved=false;
    };
    window.addEventListener('mousemove',onMove,{passive:true});
    window.addEventListener('mouseup',onUp,{passive:true});
  },{passive:true});
}

// ── Tap ────────────────────────────────────────────────────────
function handleTap(r,c){
  const val=board[r][c];
  if(isBooster(val)){
    if(val.kind==='color'){activateColorBombByTap(r,c);return;}
    activateBoosterByTap(r,c,val);
    return;
  }
  if(!selected){selected=[r,c];getCell(r,c)?.classList.add('selected');}
  else{
    const[sr,sc]=selected;
    if(sr===r&&sc===c){clearSelected();return;}
    if(isAdjacent(sr,sc,r,c)){clearSelected();doSwap(sr,sc,r,c);}
    else{clearSelected();selected=[r,c];getCell(r,c)?.classList.add('selected');}
  }
}
function clearSelected(){if(selected)getCell(selected[0],selected[1])?.classList.remove('selected');selected=null;}
function isAdjacent(r1,c1,r2,c2){return(Math.abs(r1-r2)===1&&c1===c2)||(Math.abs(c1-c2)===1&&r1===r2);}

// ── Booster tap activation ─────────────────────────────────────
async function activateBoosterByTap(r,c,val){
  busy=true;spendMove();
  const targets=getBoosterTargets(r,c,val);targets.add(`${r},${c}`);
  const labels={row:'🚀 ROW BLAST!',col:'🚀 COL BLAST!',bomb:'💣 BOMB!',tshape:'✚ CROSS BLAST!'};
  showComboText(labels[val.kind]||'⚡ BOOSTER!');
  if(tg)tg.HapticFeedback?.impactOccurred('heavy');
  await processMatches(targets);
  busy=false;checkGameOver();
}

// ── Color bomb ─────────────────────────────────────────────────
function mostFrequentGemType(){
  const counts=new Array(GEM_TYPES).fill(0);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const v=board[r][c];if(!isBooster(v)&&v>=0)counts[v]++;}
  let best=0;for(let i=1;i<GEM_TYPES;i++)if(counts[i]>counts[best])best=i;
  return best;
}
async function activateColorBombByTap(r,c){
  busy=true;spendMove();
  const targetType=mostFrequentGemType();
  const targets=new Set();
  for(let rr=0;rr<ROWS;rr++)for(let cc=0;cc<COLS;cc++)if(gemType(board[rr][cc])===targetType)targets.add(`${rr},${cc}`);
  targets.add(`${r},${c}`);
  showComboText('🌈 AUTO BLAST!');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  await processMatches(targets);
  busy=false;checkGameOver();
}
async function activateColorBomb(br,bc,targetType){
  busy=true;spendMove();
  const targets=new Set();
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(gemType(board[r][c])===targetType)targets.add(`${r},${c}`);
  targets.add(`${br},${bc}`);
  showComboText('🌈 COLOR BLAST!');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  await processMatches(targets);
  busy=false;checkGameOver();
}

// ── Swap ───────────────────────────────────────────────────────
async function doSwap(r1,c1,r2,c2){
  busy=true;
  await animateSwap(r1,c1,r2,c2);
  [board[r1][c1],board[r2][c2]]=[board[r2][c2],board[r1][c1]];
  updateCellGem(r1,c1);updateCellGem(r2,c2);
  const activated=await checkBoosterSwapActivation(r1,c1,r2,c2);
  if(activated){spendMove();busy=false;checkGameOver();return;}
  const matched=findAllMatches();
  if(matched.size===0){
    await animateSwap(r1,c1,r2,c2);
    [board[r1][c1],board[r2][c2]]=[board[r2][c2],board[r1][c1]];
    updateCellGem(r1,c1);updateCellGem(r2,c2);
    animGemClass(getCell(r1,c1)?.querySelector('.gem'),'invalid');
    animGemClass(getCell(r2,c2)?.querySelector('.gem'),'invalid');
    await wait(320);
  }else{
    spendMove();
    await processMatches(matched);
  }
  busy=false;checkGameOver();
}
async function animateSwap(r1,c1,r2,c2){
  const cA=getCell(r1,c1),cB=getCell(r2,c2);if(!cA||!cB)return;
  const sz=getCellSize(),gap=6,step=sz+gap;
  const tx=(c2-c1)*step,ty=(r2-r1)*step;
  const gA=cA.querySelector('.gem'),gB=cB.querySelector('.gem');if(!gA||!gB)return;
  gA.style.transition=gB.style.transition='transform 0.18s cubic-bezier(.4,0,.2,1)';
  gA.style.transform=`translate(${tx}px,${ty}px)`;gB.style.transform=`translate(${-tx}px,${-ty}px)`;
  await wait(190);
  gA.style.transition=gA.style.transform='';gB.style.transition=gB.style.transform='';
}
async function checkBoosterSwapActivation(r1,c1,r2,c2){
  const v1=board[r1][c1],v2=board[r2][c2];
  const b1=isBooster(v1),b2=isBooster(v2);
  if(!b1&&!b2)return false;

  // ── Both color bombs → nuke everything ─────────────────────
  if(b1&&b2&&v1.kind==='color'&&v2.kind==='color'){
    const all=new Set();for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)all.add(`${r},${c}`);
    showComboText('🌈 RAINBOW NUKE!! 🌈');await processMatches(all);return true;
  }

  // ── Color bomb + any gem/booster → clear that color ────────
  if((b1&&v1.kind==='color')||(b2&&v2.kind==='color')){
    const[cp,op]=b1&&v1.kind==='color'?[[r1,c1],[r2,c2]]:[[r2,c2],[r1,c1]];
    const t=gemType(board[op[0]][op[1]]);const targets=new Set();
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(gemType(board[r][c])===t)targets.add(`${r},${c}`);
    targets.add(`${cp[0]},${cp[1]}`);showComboText('🌈 COLOR BLAST!');
    await processMatches(targets);return true;
  }

  // ── Two rockets (row/col) → cross blast ────────────────────
  if(b1&&b2&&(v1.kind==='row'||v1.kind==='col')&&(v2.kind==='row'||v2.kind==='col')){
    const targets=new Set();
    for(let c=0;c<COLS;c++)targets.add(`${r1},${c}`);  // full row through r1
    for(let r=0;r<ROWS;r++)targets.add(`${r},${c1}`);  // full col through c1
    for(let c=0;c<COLS;c++)targets.add(`${r2},${c}`);  // also r2's row
    for(let r=0;r<ROWS;r++)targets.add(`${r},${c2}`);  // also c2's col
    showComboText('✚ DOUBLE CROSS!');await processMatches(targets);return true;
  }

  // ── Two T-shape boosters → cross + both diagonals ──────────
  if(b1&&b2&&v1.kind==='tshape'&&v2.kind==='tshape'){
    const targets=new Set();
    const cr=r1,cc=c1; // center on first booster
    for(let c=0;c<COLS;c++)targets.add(`${cr},${c}`);   // full row
    for(let r=0;r<ROWS;r++)targets.add(`${r},${cc}`);   // full col
    // main diagonal (top-left → bottom-right)
    for(let d=-(Math.max(ROWS,COLS));d<=Math.max(ROWS,COLS);d++){
      const r=cr+d,c=cc+d;if(r>=0&&r<ROWS&&c>=0&&c<COLS)targets.add(`${r},${c}`);
    }
    // anti-diagonal (top-right → bottom-left)
    for(let d=-(Math.max(ROWS,COLS));d<=Math.max(ROWS,COLS);d++){
      const r=cr+d,c=cc-d;if(r>=0&&r<ROWS&&c>=0&&c<COLS)targets.add(`${r},${c}`);
    }
    showComboText('✨ STAR BLAST!');await processMatches(targets);return true;
  }

  // ── Two bombs → 4×4 explosion ──────────────────────────────
  if(b1&&b2&&(v1.kind==='bomb'||v1.kind==='color')&&(v2.kind==='bomb'||v2.kind==='color')
    &&v1.kind==='bomb'&&v2.kind==='bomb'){
    const targets=new Set();
    // 4×4 area: offsets -2,-1,0,+1 in each direction (center on r1,c1)
    for(let dr=-2;dr<=1;dr++)for(let dc=-2;dc<=1;dc++){
      const r=r1+dr,c=c1+dc;if(r>=0&&r<ROWS&&c>=0&&c<COLS)targets.add(`${r},${c}`);
    }
    showComboText('💣💣 MEGA BOMB!');await processMatches(targets);return true;
  }

  // ── Single booster + normal gem (or unmatched pair) ────────
  const[bR,bC,bVal]=b1?[r1,c1,v1]:[r2,c2,v2];
  const tgts=getBoosterTargets(bR,bC,bVal);tgts.add(`${bR},${bC}`);
  const labels={row:'🚀 ROW BLAST!',col:'🚀 COL BLAST!',bomb:'💣 BOMB!',tshape:'✚ CROSS!',color:'🌈 COLOR!'};
  showComboText(labels[bVal.kind]||'⚡');
  await processMatches(tgts);return true;
}

function getBoosterTargets(r,c,val){
  const t=new Set();
  if(val.kind==='row'){for(let cc=0;cc<COLS;cc++)t.add(`${r},${cc}`);}
  else if(val.kind==='col'){for(let rr=0;rr<ROWS;rr++)t.add(`${rr},${c}`);}
  else if(val.kind==='tshape'){
    for(let cc=0;cc<COLS;cc++)t.add(`${r},${cc}`);
    for(let rr=0;rr<ROWS;rr++)t.add(`${rr},${c}`);
  }
  else if(val.kind==='bomb'||val.kind==='color'){
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      const r2=r+dr,c2=c+dc;if(r2>=0&&r2<ROWS&&c2>=0&&c2<COLS)t.add(`${r2},${c2}`);
    }
  }
  return t;
}

// ── Match detection ────────────────────────────────────────────
function findAllMatchGroups(){
  const groups=[];
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS-2;){
      if(isBooster(board[r][c])){c++;continue;}
      const t=gemType(board[r][c]);let end=c;
      while(end+1<COLS&&gemType(board[r][end+1])===t&&!isBooster(board[r][end+1]))end++;
      const len=end-c+1;
      if(len>=3){const cells=[];for(let k=c;k<=end;k++)cells.push([r,k]);groups.push({cells,dir:'h',len});}
      c=end+1;
    }
  }
  for(let c=0;c<COLS;c++){
    for(let r=0;r<ROWS-2;){
      if(isBooster(board[r][c])){r++;continue;}
      const t=gemType(board[r][c]);let end=r;
      while(end+1<ROWS&&gemType(board[end+1][c])===t&&!isBooster(board[end+1][c]))end++;
      const len=end-r+1;
      if(len>=3){const cells=[];for(let k=r;k<=end;k++)cells.push([k,c]);groups.push({cells,dir:'v',len});}
      r=end+1;
    }
  }
  return groups;
}
function findSquares(){
  const sq=[];
  for(let r=0;r<ROWS-1;r++)for(let c=0;c<COLS-1;c++){
    if(isBooster(board[r][c]))continue;
    const t=gemType(board[r][c]);
    if(gemType(board[r][c+1])===t&&!isBooster(board[r][c+1])&&
       gemType(board[r+1][c])===t&&!isBooster(board[r+1][c])&&
       gemType(board[r+1][c+1])===t&&!isBooster(board[r+1][c+1]))
      sq.push({r,c,gemType:t});
  }
  return sq;
}
function findTShapes(){
  const shapes=[];
  const seen=new Set();
  function ok(r,c,t){return r>=0&&r<ROWS&&c>=0&&c<COLS&&!isBooster(board[r][c])&&gemType(board[r][c])===t;}
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS-2;c++){
      if(isBooster(board[r][c]))continue;
      const t=gemType(board[r][c]);
      if(!ok(r,c+1,t)||!ok(r,c+2,t))continue;
      const candidates=[[r-1,c],[r+1,c],[r-1,c+1],[r+1,c+1],[r-1,c+2],[r+1,c+2]].filter(([br,bc])=>ok(br,bc,t));
      if(candidates.length>=2){
        const chosen=candidates.slice(0,2);
        const cells=[[r,c],[r,c+1],[r,c+2],...chosen];
        const key=cells.map(([r,c])=>`${r},${c}`).sort().join('|');
        if(!seen.has(key)){seen.add(key);shapes.push({cells,midR:r,midC:c+1,gemType:t});}
      }
    }
  }
  for(let c=0;c<COLS;c++){
    for(let r=0;r<ROWS-2;r++){
      if(isBooster(board[r][c]))continue;
      const t=gemType(board[r][c]);
      if(!ok(r+1,c,t)||!ok(r+2,c,t))continue;
      const candidates=[[r,c-1],[r,c+1],[r+1,c-1],[r+1,c+1],[r+2,c-1],[r+2,c+1]].filter(([br,bc])=>ok(br,bc,t));
      if(candidates.length>=2){
        const chosen=candidates.slice(0,2);
        const cells=[[r,c],[r+1,c],[r+2,c],...chosen];
        const key=cells.map(([r,c])=>`${r},${c}`).sort().join('|');
        if(!seen.has(key)){seen.add(key);shapes.push({cells,midR:r+1,midC:c,gemType:t});}
      }
    }
  }
  return shapes;
}
function findAllMatches(){
  const m=new Set();
  findAllMatchGroups().forEach(g=>g.cells.forEach(([r,c])=>m.add(`${r},${c}`)));
  findSquares().forEach(s=>{m.add(`${s.r},${s.c}`);m.add(`${s.r},${s.c+1}`);m.add(`${s.r+1},${s.c}`);m.add(`${s.r+1},${s.c+1}`);});
  findTShapes().forEach(s=>s.cells.forEach(([r,c])=>m.add(`${r},${c}`)));
  return m;
}

// ── Particles — pooled, capped ─────────────────────────────────
const MAX_PARTICLES=40;
let particleCount=0;
function spawnParticles(cellEl,type){
  if(particleCount>=MAX_PARTICLES)return; // skip if too many active
  if(type<0||type>=GEM_COLORS.length)type=0;
  const rect=cellEl.getBoundingClientRect(),bRect=boardEl.getBoundingClientRect();
  const x=rect.left-bRect.left+rect.width/2,y=rect.top-bRect.top+rect.height/2;
  const count=Math.min(3,MAX_PARTICLES-particleCount); // max 3 per cell
  for(let i=0;i<count;i++){
    particleCount++;
    const p=document.createElement('div');p.className='particle';const sz=3+Math.random()*5;
    p.style.cssText=`width:${sz}px;height:${sz}px;background:${GEM_COLORS[type]};left:${x}px;top:${y}px;--tx:${(Math.random()-.5)*50}px;--ty:${-10-Math.random()*40}px;--dur:${0.3+Math.random()*.25}s;`;
    boardEl.appendChild(p);
    setTimeout(()=>{p.remove();particleCount--;},600);
  }
}

// ── Process matches — iterative queue, no recursion ────────────
async function processMatches(initialSet,combo=0){
  // Use a queue instead of recursion to avoid call-stack buildup
  let currentSet=initialSet;
  while(currentSet.size>0){
    combo++;
    const cellsInSet=new Set(currentSet);
    const boostersToCreate=[];
    const tshapesUsed=new Set();
    const squaresUsed=new Set();

    findTShapes().forEach(ts=>{
      const keys=ts.cells.map(([r,c])=>`${r},${c}`);
      if(keys.every(k=>cellsInSet.has(k))){
        boostersToCreate.push({r:ts.midR,c:ts.midC,kind:'tshape',gemType:ts.gemType});
        keys.forEach(k=>tshapesUsed.add(k));
      }
    });
    findSquares().forEach(sq=>{
      const keys=[`${sq.r},${sq.c}`,`${sq.r},${sq.c+1}`,`${sq.r+1},${sq.c}`,`${sq.r+1},${sq.c+1}`];
      if(keys.every(k=>cellsInSet.has(k)&&!tshapesUsed.has(k))){
        boostersToCreate.push({r:sq.r,c:sq.c,kind:'bomb',gemType:sq.gemType});
        keys.forEach(k=>squaresUsed.add(k));
      }
    });
    findAllMatchGroups().forEach(g=>{
      if(g.len<4)return;
      const inMatch=g.cells.filter(([r,c])=>{
        const k=`${r},${c}`;return cellsInSet.has(k)&&!squaresUsed.has(k)&&!tshapesUsed.has(k);
      });
      if(!inMatch.length)return;
      const[pr,pc]=inMatch[Math.floor(inMatch.length/2)];
      boostersToCreate.push({r:pr,c:pc,kind:g.len>=5?'color':g.dir==='h'?'row':'col',gemType:gemType(board[pr][pc])});
    });

    const boosterPos=new Set(boostersToCreate.map(b=>`${b.r},${b.c}`));
    const cells=[...currentSet].map(k=>k.split(',').map(Number));

    // Animate matched cells out — skip slow animation for large blasts
    const bigBlast=cells.length>12;
    cells.forEach(([r,c])=>{
      if(boosterPos.has(`${r},${c}`))return;
      const cell=getCell(r,c);if(!cell)return;
      if(!bigBlast)spawnParticles(cell,gemType(board[r][c]));
      const g=cell.firstElementChild;
      if(g){
        if(bigBlast){
          g.style.transition='none';g.style.transform='scale(0)';g.style.opacity='0';
        } else {
          g.style.transition='transform 0.12s cubic-bezier(.4,0,.2,1),opacity 0.12s ease';
          g.style.transform='scale(1.15)';g.style.opacity='1';
          setTimeout(()=>{g.style.transform='scale(0)';g.style.opacity='0';},70);
        }
      }
    });

    if(combo>1)showCombo(combo);
    if(boostersToCreate.length)showBoosterLabels(boostersToCreate);
    addScore(cells.length*SCORE_PER_GEM*combo+boostersToCreate.length*100);
    await wait(bigBlast?80:160);

    // Collect chain targets from any boosters inside the match
    const chainTargets=new Set();
    cells.forEach(([r,c])=>{
      const v=board[r][c];
      if(isBooster(v)&&!boosterPos.has(`${r},${c}`)){
        getBoosterTargets(r,c,v).forEach(k=>chainTargets.add(k));
      }
      board[r][c]=-1;
    });
    boostersToCreate.forEach(b=>{board[b.r][b.c]={kind:b.kind,gemType:b.gemType};});

    // Resolve chain targets (boosters hit by this blast) BEFORE gravity
    // Keep expanding until no more boosters are hit
    if(chainTargets.size>0){
      // Remove already-cleared cells
      for(const k of [...chainTargets]){
        const[r,c]=k.split(',').map(Number);
        if(board[r][c]===-1)chainTargets.delete(k);
      }
      if(chainTargets.size>0){
        showComboText('⚡ CHAIN!');
        // Animate chain cells
        for(const k of chainTargets){
          const[r,c]=k.split(',').map(Number);
          const cell=getCell(r,c);if(!cell)continue;
          const g=cell.firstElementChild;
          if(g){g.style.transition='none';g.style.transform='scale(0)';g.style.opacity='0';}
        }
        // Collect any further boosters hit by the chain
        const extra=new Set();
        for(const k of [...chainTargets]){
          const[r,c]=k.split(',').map(Number);
          const v=board[r][c];
          if(isBooster(v))getBoosterTargets(r,c,v).forEach(kk=>extra.add(kk));
          board[r][c]=-1;
        }
        addScore([...chainTargets].length*SCORE_PER_GEM*combo);
        // Merge further-chain cells (not already cleared)
        for(const k of extra){
          const[r,c]=k.split(',').map(Number);
          if(board[r][c]!==-1)chainTargets.add(k);
        }
        await wait(80);
        // Clear remaining chain targets (deep chain)
        for(const k of [...chainTargets]){
          const[r,c]=k.split(',').map(Number);
          if(board[r][c]!==-1){
            spawnParticles(getCell(r,c),gemType(board[r][c]));
            board[r][c]=-1;
          }
        }
      }
    }

    await applyGravityAndFill();
    boostersToCreate.forEach(b=>updateCellGem(b.r,b.c));
    await wait(30);

    // If a level-up happened this cascade, stop and show the overlay
    if(levelUpPending){
      levelUpPending=false;
      setTimeout(()=>showOverlay('levelup'),400);
      break;
    }

    // Next iteration: any new matches formed?
    currentSet=findAllMatches();
  }
  // Board settled — start idle hint timer
  resetHintTimer();
}

function showBoosterLabels(boosters){
  const labels={row:'🚀 LINE ROCKET!',col:'🚀 LINE ROCKET!',color:'🌈 COLOR BOMB!',bomb:'💣 BOMB!',tshape:'✚ T-BLAST!'};
  [...new Set(boosters.map(b=>b.kind))].forEach((k,i)=>setTimeout(()=>showComboText(labels[k]||'⚡ BOOSTER!'),i*220));
}

// ── Gravity & Fill ─────────────────────────────────────────────
async function applyGravityAndFill(){
  const sz=getCellSize(),gap=6,step=sz+gap;

  // ── Phase 1: update data model only (no DOM yet) ───────────
  // Track which board positions were empty before fill
  const wasEmpty=[];
  for(let c=0;c<COLS;c++){
    wasEmpty[c]=[];
    // compact: move non-empty values to bottom
    const col=[];
    for(let r=0;r<ROWS;r++)if(board[r][c]!==-1)col.push(board[r][c]);
    const empties=ROWS-col.length;
    for(let r=0;r<ROWS;r++){
      if(r<empties){
        wasEmpty[c][r]=true;
        board[r][c]=Math.floor(Math.random()*GEM_TYPES);
      } else {
        wasEmpty[c][r]=false;
        board[r][c]=col[r-empties];
      }
    }
  }

  // ── Phase 2: animate existing gems sliding down ────────────
  // For each gem currently in the DOM that needs to move,
  // apply a CSS translateY BEFORE touching innerHTML.
  // We read the gem element positions FIRST, then write transforms.
  let maxFallMs=0;
  // Build a map: for each (r,c) that has a gem sliding down, how far?
  // We need to know: after compaction, board[r][c] came from old row (r - fallDist)
  // But we already updated board[][] above. Instead: animate by column.
  // For column c: gems in rows [empties..ROWS-1] came from old rows [0..ROWS-1-empties]
  // So gem at new row r came from old row (r - empties[c]).
  // We'll re-read DOM: the OLD gem is still at the old position.

  // Re-do: we need old positions. Let's snapshot before compaction.
  // Since we already compacted above, we need a different approach:
  // Just rebuild DOM column by column but KEEP existing gems and move them.

  // Strategy: for each column, reuse existing gem elements by moving them.
  // 1. Detach all gems from this column into an array (fast, no reflow per cell)
  // 2. Place them back into the right cells with fall animation
  // This avoids innerHTML='' blank frames entirely.

  const allFalls=[];

  for(let c=0;c<COLS;c++){
    // Detach all existing gems in this column (DOM read batch)
    const oldGems=[];
    for(let r=0;r<ROWS;r++){
      const cell=getCell(r,c);
      const g=cell?cell.firstElementChild:null;
      oldGems[r]=g||null;
      if(g)cell.removeChild(g); // fast detach, no reflow
    }

    const empties=wasEmpty[c].filter(Boolean).length;

    // Place gems back: rows [0..empties-1] are new, [empties..ROWS-1] are old
    for(let r=0;r<ROWS;r++){
      const cell=getCell(r,c);if(!cell)continue;
      let g;
      if(wasEmpty[c][r]){
        // New gem spawning from above
        g=makeGem(board[r][c]);
        const fd=empties; // fall from empties rows above
        g.style.transform=`translateY(${-fd*step}px)`;
        g.style.opacity='0';
        cell.appendChild(g);
        const delay=r*14;
        const ms=180+fd*40+delay;
        if(ms>maxFallMs)maxFallMs=ms;
        allFalls.push({g,fd,delay,spawn:true});
      } else {
        // Existing gem — came from old row (r - empties)
        const oldR=r-empties;
        g=oldGems[oldR]||null;
        if(!g){
          // Shouldn't happen but fallback: make fresh
          g=makeGem(board[r][c]);
          cell.appendChild(g);
          g.style.transform='';g.style.opacity='1';
        } else {
          // Clear any lingering transform from explosion animation
          g.style.transition='none';
          g.style.transform= empties>0 ? `translateY(0)` : '';
          g.style.opacity='1';
          cell.appendChild(g);
          if(empties>0){
            // This gem needs to fall down by empties rows visually
            // It's already placed at the correct final position.
            // We animate it from -empties*step above.
            // But wait: the gem is already at the right DOM row.
            // Animate: start above, slide to 0.
            // We must set initial transform BEFORE next paint.
            const fd2=empties;
            const delay=r*14;
            const ms2=180+fd2*40+delay;
            if(ms2>maxFallMs)maxFallMs=ms2;
            allFalls.push({g,fd:fd2,delay,spawn:false,existing:true});
          }
        }
        const bc=g.querySelector?.('.booster-canvas');
        if(bc&&!bc.width)requestAnimationFrame(()=>drawBoosterCanvas(bc));
      }
    }
  }

  // ── Phase 3: trigger all animations in ONE rAF batch ───────
  // First rAF: set starting positions (translateY up for fallers)
  // Second rAF: apply transitions to trigger CSS animation
  if(allFalls.length>0){
    requestAnimationFrame(()=>{
      // Set initial offsets (start position)
      allFalls.forEach(({g,fd,spawn,existing})=>{
        if(spawn){
          // already set above
        } else if(existing){
          g.style.transition='none';
          g.style.transform=`translateY(${-fd*step}px)`;
          g.style.opacity='1';
        }
      });
      requestAnimationFrame(()=>{
        // Now animate to final position
        allFalls.forEach(({g,fd,delay})=>{
          setTimeout(()=>{
            g.style.transition=`transform ${0.11+fd*0.04}s cubic-bezier(.4,0,.6,1),opacity 0.08s`;
            g.style.transform='translateY(0)';
            g.style.opacity='1';
          },delay);
        });
      });
    });
  }

  if(maxFallMs>0)await wait(maxFallMs);
  else await wait(60);
}

// ── Score & Level ──────────────────────────────────────────────
let levelUpPending=false; // guard against double level-up in one cascade

function addScore(pts){
  score+=pts;levelScore+=pts;
  scoreEl.textContent=score;
  scoreEl.classList.remove('pop');void scoreEl.offsetWidth;scoreEl.classList.add('pop');
  if(levelScore>=levelThreshold(level) && !levelUpPending){
    levelUpPending=true;
    levelScore=0;
    level++;
    moves=MOVE_PER_LEVEL;movesEl.textContent=moves;
    levelEl.textContent=`⭐ Level ${level}`;
    progressEl.style.width='0%';
    return;
  }
  progressEl.style.width=Math.min((levelScore/levelThreshold(level))*100,100)+'%';
}

// ── UI helpers ─────────────────────────────────────────────────
function showCombo(n){
  if(n<2)return;
  const labels=['','','DOUBLE!','TRIPLE!','QUAD!','PENTA!','ULTRA!'];
  showComboText(labels[Math.min(n,labels.length-1)]||`${n}x COMBO!`);
  if(tg)tg.HapticFeedback?.impactOccurred(n>=4?'heavy':'medium');
}
function showComboText(text){
  const el=document.createElement('div');el.className='combo-text';el.textContent=text;
  boardEl.appendChild(el);setTimeout(()=>el.remove(),900);
}
function animGemClass(gem,cls){
  if(!gem)return;gem.classList.remove(cls);void gem.offsetWidth;gem.classList.add(cls);
}

// ── Toolbar power-ups ──────────────────────────────────────────
function useHint(){
  if(hints<=0||busy)return;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)
    for(const[r2,c2]of[[r,c+1],[r+1,c]]){
      if(r2>=ROWS||c2>=COLS)continue;
      [board[r][c],board[r2][c2]]=[board[r2][c2],board[r][c]];
      const m=findAllMatches();
      [board[r][c],board[r2][c2]]=[board[r2][c2],board[r][c]];
      if(m.size>0){
        hints--;
        [getCell(r,c),getCell(r2,c2)].forEach(el=>{
          if(!el)return;
          el.style.boxShadow='0 0 0 3px #f9c74f,0 0 20px rgba(249,199,79,0.6)';
          setTimeout(()=>{if(el)el.style.boxShadow='';},1500);
        });
        if(tg)tg.HapticFeedback?.impactOccurred('light');return;
      }
    }
}
async function useShuffle(){
  if(shuffles<=0||busy)return;
  shuffles--;
  document.getElementById('shuffle-count').textContent=shuffles;
  busy=true;
  if(tg)tg.HapticFeedback?.impactOccurred('medium');

  // Phase 1: scatter all gems out with staggered timing + random rotation
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const g=getCell(r,c)?.querySelector('.gem');
      if(!g)continue;
      const angle=(Math.random()-0.5)*60; // -30..+30 deg
      g.style.setProperty('--sr', angle+'deg');
      const delay=(r+c)*18; // diagonal wave
      setTimeout(()=>animGemClass(g,'shuffle-out'), delay);
    }
  }

  // Wait for scatter to finish (max diagonal delay + animation duration)
  await wait(((ROWS+COLS-2)*18)+260);

  // Phase 2: shuffle the data
  const flat=board.flat();
  for(let i=flat.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[flat[i],flat[j]]=[flat[j],flat[i]];}
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)board[r][c]=flat[r*COLS+c];
  renderBoard(); // rebuild DOM with new data

  // Phase 3: land gems in with staggered timing (reverse wave — center outward)
  const cx=COLS/2, cy=ROWS/2;
  const cells2=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)cells2.push({r,c,dist:Math.hypot(r-cy,c-cx)});
  cells2.sort((a,b)=>a.dist-b.dist); // center first

  cells2.forEach(({r,c},i)=>{
    const g=getCell(r,c)?.querySelector('.gem');
    if(!g)return;
    const angle=(Math.random()-0.5)*50;
    const dy=(Math.random()-0.5)*30;
    g.style.setProperty('--sr', angle+'deg');
    g.style.setProperty('--sy', dy+'px');
    g.style.opacity='0'; // start hidden
    setTimeout(()=>{ g.style.opacity=''; animGemClass(g,'shuffle-in'); }, i*12);
  });

  await wait(cells2.length*12+380);
  busy=false;

  // Check for matches formed after shuffle
  const m=findAllMatches();
  if(m.size>0){busy=true;await processMatches(m);busy=false;}
  checkGameOver();
  resetHintTimer();
}

// ── Bomb drag-to-place ─────────────────────────────────────────
let bombDragging=false;
const bombGhost=()=>document.getElementById('bomb-ghost');

function getBombTargets(r,c){
  const t=new Set();
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    const r2=r+dr,c2=c+dc;if(r2>=0&&r2<ROWS&&c2>=0&&c2<COLS)t.add(`${r2},${c2}`);
  }
  return t;
}

function cellFromPoint(x,y){
  const el=document.elementFromPoint(x,y);
  if(!el) return null;
  const cell=el.closest('.cell');
  if(!cell) return null;
  return {r:+cell.dataset.r, c:+cell.dataset.c, el:cell};
}

function clearBombHighlight(){
  boardEl.querySelectorAll('.bomb-target').forEach(el=>el.classList.remove('bomb-target'));
}

function highlightBombArea(r,c){
  clearBombHighlight();
  getBombTargets(r,c).forEach(k=>{
    const[row,col]=k.split(',').map(Number);
    getCell(row,col)?.classList.add('bomb-target');
  });
}

function startBombDrag(e){
  if(bombs<=0||busy)return;
  e.preventDefault();
  bombDragging=true;
  const ghost=bombGhost();
  ghost.style.display='block';
  const btnEl=document.getElementById('btn-bomb');
  btnEl.classList.add('dragging');

  const clientX=e.touches?e.touches[0].clientX:e.clientX;
  const clientY=e.touches?e.touches[0].clientY:e.clientY;
  ghost.style.left=clientX+'px';
  ghost.style.top=clientY+'px';

  const onMove=ev=>{
    const cx=ev.touches?ev.touches[0].clientX:ev.clientX;
    const cy=ev.touches?ev.touches[0].clientY:ev.clientY;
    ghost.style.left=cx+'px';
    ghost.style.top=cy+'px';
    const hit=cellFromPoint(cx,cy);
    if(hit) highlightBombArea(hit.r,hit.c);
    else clearBombHighlight();
  };

  const onEnd=async ev=>{
    window.removeEventListener('touchmove',onMove);
    window.removeEventListener('mousemove',onMove);
    window.removeEventListener('touchend',onEnd);
    window.removeEventListener('mouseup',onEnd);

    ghost.style.display='none';
    btnEl.classList.remove('dragging');
    clearBombHighlight();
    bombDragging=false;

    const cx=ev.changedTouches?ev.changedTouches[0].clientX:ev.clientX;
    const cy=ev.changedTouches?ev.changedTouches[0].clientY:ev.clientY;
    const hit=cellFromPoint(cx,cy);
    if(!hit){return;} // dropped outside board — no use
    bombs--;
    document.getElementById('bomb-count').textContent=bombs;
    busy=true;
    const targets=getBombTargets(hit.r,hit.c);
    if(tg)tg.HapticFeedback?.notificationOccurred('success');
    showComboText('💣 BOOM!');
    await processMatches(targets);
    busy=false;checkGameOver();
  };

  window.addEventListener('touchmove',onMove,{passive:false});
  window.addEventListener('mousemove',onMove,{passive:true});
  window.addEventListener('touchend',onEnd,{passive:true});
  window.addEventListener('mouseup',onEnd,{passive:true});
}

async function useBomb(){
  // fallback tap — shouldn't be reached now but keep for safety
  if(bombs<=0||busy)return;
  bombs--;
  document.getElementById('bomb-count').textContent=bombs;
  busy=true;
  const cr=Math.floor(ROWS/2),cc=Math.floor(COLS/2);
  const targets=getBombTargets(cr,cc);
  await processMatches(targets);
  busy=false;if(tg)tg.HapticFeedback?.notificationOccurred('success');checkGameOver();
}

// ── Game over & overlays ───────────────────────────────────────
function boardHasBoosters(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(isBooster(board[r][c]))return true;
  return false;
}
function checkGameOver(){
  if(moves>0)return;
  if(boardHasBoosters())return; // still have boosters to use — don't end yet
  setTimeout(()=>showOverlay('gameover'),400);
}

function overlayAction5(){
  overlay.style.display='none';
  // Reset score for new level, keep level counter
  score=0;levelScore=0;
  scoreEl.textContent='0';
  progressEl.style.width='0%';
  _cellSize=0;
  selected=null;busy=false;
  createBoard();renderBoard();
  requestAnimationFrame(async()=>{
    const initial=findAllMatches();
    if(initial.size>0){busy=true;await processMatches(initial);busy=false;}
    resetHintTimer();
  });
}
function showStartOverlay(){
  document.getElementById('overlay-emoji').textContent='💎';
  document.getElementById('overlay-title').textContent='Gem Crush';
  document.getElementById('overlay-sub').textContent='Match 4 → 🚀 Rocket  •  Match 5 → 🌈 Color Bomb\n2×2 → 💣 Bomb  •  T-shape → ✚ Cross Blast\nTap any booster to activate!';
  document.getElementById('overlay-score').style.display='none';
  document.getElementById('overlay-btn').textContent='▶ Play';
  document.getElementById('overlay-btn2').style.display='none';
  document.getElementById('overlay-btn3').style.display='none';
  document.getElementById('overlay-btn4').style.display='none';
  document.getElementById('overlay-btn5').style.display='none';
  overlay.style.display='flex';
}
function startGame(){
  score=0;levelScore=0;level=1;moves=MOVE_PER_LEVEL;
  hints=3;shuffles=2;bombs=1;colorBombPending=null;levelUpPending=false;
  _cellSize=0;
  scoreEl.textContent='0';movesEl.textContent=moves;
  levelEl.textContent='⭐ Level 1';progressEl.style.width='0%';
  document.getElementById('shuffle-count').textContent=shuffles;
  document.getElementById('bomb-count').textContent=bombs;
  selected=null;busy=false;createBoard();renderBoard();
  requestAnimationFrame(async()=>{
    const initial=findAllMatches();
    if(initial.size>0){busy=true;await processMatches(initial);busy=false;}
    resetHintTimer();
  });
}

createBoard();renderBoard();setupBoardInput();showStartOverlay();
</script>
